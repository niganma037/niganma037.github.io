<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>18warehouse · 档案</title>
  <style>
    /* === 全局变量 & 基础 === */
    :root {
      --glass-bg: rgba(255, 255, 255, 0.28);
      --glass-bg-hover: rgba(255, 255, 255, 0.45);
      --glass-bg-card: rgba(255, 255, 255, 0.32);
      --glass-border: rgba(255, 255, 255, 0.55);
      --glass-border-strong: rgba(255, 255, 255, 0.72);
      --glass-border-subtle: rgba(255, 255, 255, 0.38);
      --glass-shadow: 0 10px 30px rgba(0, 0, 0, 0.06), 0 2px 10px rgba(0, 0, 0, 0.03);
      --glass-shadow-hover: 0 18px 45px rgba(0, 0, 0, 0.10), 0 4px 16px rgba(0, 0, 0, 0.05);
      --glass-shadow-lg: 0 25px 55px rgba(0, 0, 0, 0.08), 0 8px 20px rgba(0, 0, 0, 0.04);
      --text-primary: #1a2533;
      --text-secondary: #445566;
      --text-tertiary: #778899;
      --accent: #4f8cc9;
      --accent-soft: #6ba3df;
      --accent-glow: rgba(79, 140, 201, 0.25);
      --radius-sm: 10px;
      --radius: 14px;
      --radius-lg: 18px;
      --radius-xl: 24px;
      --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-bounce: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      --font-display: 'Dancing Script', 'Caveat', 'Segoe Script', 'Comic Sans MS', cursive, sans-serif;
      --font-body: "Microsoft YaHei UI", "PingFang SC", "Segoe UI", system-ui, -apple-system, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-body);
      background: linear-gradient(155deg, #eef6ff 0%, #e2effc 25%, #eaf3fd 50%, #dce9f9 75%, #f2f8ff 100%);
      background-attachment: fixed;
      min-height: 100vh;
      color: var(--text-primary);
      letter-spacing: 0.01em;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* 动态光斑 (更柔和) */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(130px);
      z-index: -1;
      pointer-events: none;
    }
    .orb-1 {
      width: 550px; height: 550px;
      background: #b8d6ff;
      top: -110px; left: -90px;
      animation: orbFloat1 20s ease-in-out infinite;
    }
    .orb-2 {
      width: 650px; height: 650px;
      background: #cfe4ff;
      bottom: -160px; right: -130px;
      animation: orbFloat2 24s ease-in-out infinite;
    }
    .orb-3 {
      width: 400px; height: 400px;
      background: #deedff;
      top: 50%; left: 55%;
      animation: orbFloat3 22s ease-in-out infinite;
      filter: blur(110px);
      opacity: 0.7;
    }

    @keyframes orbFloat1 {
      0%,100% { transform: translate(0,0) scale(1); }
      25% { transform: translate(45px,-30px) scale(1.05); }
      50% { transform: translate(-20px,30px) scale(0.94); }
      75% { transform: translate(-35px,-20px) scale(1.03); }
    }
    @keyframes orbFloat2 {
      0%,100% { transform: translate(0,0) scale(1); }
      25% { transform: translate(-35px,-45px) scale(1.04); }
      50% { transform: translate(30px,25px) scale(0.93); }
      75% { transform: translate(40px,-25px) scale(1.05); }
    }
    @keyframes orbFloat3 {
      0%,100% { transform: translate(0,0) scale(1); }
      33% { transform: translate(-30px,35px) scale(1.07); }
      66% { transform: translate(25px,-40px) scale(0.92); }
    }

    /* === 毛玻璃核心 === */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(24px) saturate(1.5);
      -webkit-backdrop-filter: blur(24px) saturate(1.5);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      transition: all var(--transition-smooth);
    }
    .glass-deep {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(32px) saturate(1.7);
      -webkit-backdrop-filter: blur(32px) saturate(1.7);
      border: 1px solid var(--glass-border-strong);
      box-shadow: var(--glass-shadow-lg);
    }
    .glass-subtle {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(18px) saturate(1.3);
      -webkit-backdrop-filter: blur(18px) saturate(1.3);
      border: 1px solid var(--glass-border-subtle);
      box-shadow: 0 4px 16px rgba(0,0,0,0.03);
    }

    /* === 页面切换 === */
    .page {
      display: none;
      min-height: 100vh;
      padding: 20px 24px;
      animation: fadeSlideIn 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .page.active {
      display: block;
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* === 返回按钮 === */
    .back-btn {
      position: fixed;
      top: 18px; left: 18px;
      z-index: 998;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      background: rgba(255,255,255,0.3);
      backdrop-filter: blur(22px) saturate(1.4);
      -webkit-backdrop-filter: blur(22px) saturate(1.4);
      border: 1px solid var(--glass-border);
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      transition: all var(--transition-fast);
      user-select: none;
    }
    .back-btn:hover {
      background: var(--glass-bg-hover);
      box-shadow: var(--glass-shadow-hover);
      border-color: var(--glass-border-strong);
      transform: translateY(-2px);
    }
    .back-btn:active { transform: scale(0.95); }

    /* === 首页标题 (18warehouse) === */
    .home-box {
      max-width: 720px;
      margin: 70px auto 0;
      padding: 0 10px;
    }
    .brand-title {
      font-family: var(--font-display);
      font-size: 56px;
      font-weight: 700;
      color: #1e2f40;
      line-height: 1.1;
      margin-bottom: 6px;
      letter-spacing: 0.02em;
      text-shadow: 0 2px 8px rgba(255,255,255,0.6);
    }
    .brand-sub {
      font-size: 15px;
      font-weight: 400;
      color: var(--text-tertiary);
      margin-bottom: 38px;
      letter-spacing: 0.05em;
    }
    .nav-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-radius: var(--radius-lg);
      margin-bottom: 14px;
      cursor: pointer;
      transition: all var(--transition-bounce);
      user-select: none;
      position: relative;
      overflow: hidden;
    }
    .nav-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(ellipse at 80% 50%, rgba(255,255,255,0.4) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
    }
    .nav-card:hover::after { opacity: 1; }
    .nav-card:hover {
      transform: translateY(-4px);
      background: var(--glass-bg-hover);
      box-shadow: var(--glass-shadow-hover);
      border-color: var(--glass-border-strong);
    }
    .nav-card-left { display: flex; align-items: center; gap: 14px; }
    .nav-card-label { font-size: 17px; font-weight: 600; }
    .nav-card-hint { font-size: 13px; color: var(--text-tertiary); margin-top: 4px; }
    .nav-card-arrow { font-size: 20px; color: var(--text-tertiary); transition: 0.2s; }
    .nav-card:hover .nav-card-arrow { transform: translateX(6px); color: var(--accent); }

    /* === 照片分类导航 (子分类) === */
    .category-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin: 15px 0 20px;
    }
    .cat-tab {
      padding: 8px 20px;
      border-radius: 30px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border-subtle);
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition-fast);
      user-select: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }
    .cat-tab:hover {
      background: var(--glass-bg-hover);
      border-color: var(--glass-border-strong);
      color: var(--text-primary);
    }
    .cat-tab.active-tab {
      background: rgba(79,140,201,0.15);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 600;
      box-shadow: 0 4px 12px var(--accent-glow);
    }

    /* 照片网格 */
    .photo-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      padding-bottom: 40px;
    }
    .photo-card {
      border-radius: var(--radius);
      overflow: hidden;
      transition: all var(--transition-bounce);
      position: relative;
      aspect-ratio: 4 / 3;
      min-height: 200px;
      display: flex;
      flex-direction: column;
    }
    .photo-card.has-image {
      cursor: pointer;
    }
    .photo-card.has-image:hover {
      transform: translateY(-5px);
      box-shadow: var(--glass-shadow-hover);
      border-color: var(--glass-border-strong);
    }
    .photo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      flex-shrink: 0;
    }
    .photo-card .placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #97adc2;
      background: rgba(255,255,255,0.1);
      position: relative;
    }
    .photo-card .placeholder::before {
      content: '';
      position: absolute;
      inset: 14px;
      border-radius: 8px;
      border: 1.5px dashed rgba(150,170,190,0.5);
      transition: 0.3s;
    }
    .photo-card:hover .placeholder::before {
      border-color: rgba(130,155,180,0.7);
      inset: 10px;
    }
    .placeholder-text {
      font-size: 14px;
      font-weight: 500;
      opacity: 0.7;
    }

    /* 上传者信息 (照片下方) */
    .photo-uploader {
      padding: 8px 12px;
      font-size: 12px;
      color: var(--text-tertiary);
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-top: 1px solid rgba(255,255,255,0.3);
      text-align: center;
      letter-spacing: 0.03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 大事记列表 */
    .events-list {
      max-width: 720px;
      margin: 0 auto;
      padding-bottom: 40px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .event-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all var(--transition-bounce);
      position: relative;
    }
    .event-item:hover {
      transform: translateY(-3px);
      background: var(--glass-bg-hover);
      box-shadow: var(--glass-shadow-hover);
    }
    .event-index {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      background: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.7);
      color: var(--accent);
    }
    .event-content { flex: 1; }
    .event-name { font-weight: 600; }
    .event-meta {
      font-size: 12px;
      color: var(--text-tertiary);
      display: flex;
      gap: 12px;
      margin-top: 4px;
    }
    .event-arrow { color: var(--text-tertiary); }

    /* 详情页 */
    .detail-box {
      max-width: 700px;
      margin: 60px auto 0;
    }
    .detail-title {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #1a2533;
    }
    .detail-card {
      padding: 40px 28px;
      text-align: center;
      border-radius: var(--radius-lg);
      color: var(--text-tertiary);
    }

    /* 查看器 */
    .viewer-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(8,12,20,0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 9999;
      justify-content: center;
      align-items: center;
    }
    .viewer-overlay.show { display: flex; }
    .viewer-overlay img {
      max-width: 90%;
      max-height: 88%;
      border-radius: 12px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
    }
    .viewer-close {
      position: absolute;
      top: 22px; right: 28px;
      font-size: 34px;
      color: white;
      cursor: pointer;
    }

    @media (max-width: 640px) {
      .brand-title { font-size: 42px; }
      .category-tabs { gap: 6px; }
      .cat-tab { padding: 6px 15px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- 首页 -->
  <div id="home" class="page active">
    <div class="home-box">
      <div class="brand-title">18warehouse</div>
      <div class="brand-sub">记录每一帧 · 档案库</div>

      <div class="nav-card glass" onclick="go('photos')">
        <div class="nav-card-left">
          <div class="nav-card-label">照片</div>
          <div class="nav-card-hint">丑照 · 恶搞 · 合照 · 个人分享</div>
        </div>
        <div class="nav-card-arrow">→</div>
      </div>

      <div class="nav-card glass" onclick="go('events')">
        <div class="nav-card-left">
          <div class="nav-card-label">大事记</div>
          <div class="nav-card-hint">10 条记录</div>
        </div>
        <div class="nav-card-arrow">→</div>
      </div>
    </div>
  </div>

  <!-- 照片页 -->
  <div id="photos" class="page">
    <button class="back-btn glass" onclick="go('home')">← 返回</button>
    <div style="text-align:center; padding-top:10px;">
      <div style="font-size:28px; font-weight:700;">照片</div>
      <div style="font-size:13px; color:#778899;">2列 · 50排 · 共100张</div>
    </div>

    <!-- 子分类导航 -->
    <div class="category-tabs" id="categoryTabs">
      <div class="cat-tab active-tab" data-cat="all">全部</div>
      <div class="cat-tab" data-cat="ugly">丑照</div>
      <div class="cat-tab" data-cat="funny">恶搞</div>
      <div class="cat-tab" data-cat="group">合照</div>
      <div class="cat-tab" data-cat="personal">个人分享</div>
    </div>

    <div class="photo-grid" id="photoGrid"></div>
  </div>

  <!-- 大事记页 -->
  <div id="events" class="page">
    <button class="back-btn glass" onclick="go('home')">← 返回</button>
    <div style="text-align:center; padding-top:10px;">
      <div style="font-size:28px; font-weight:700;">大事记</div>
      <div style="font-size:13px; color:#778899;">共10条</div>
    </div>
    <div class="events-list" id="eventsList"></div>
  </div>

  <!-- 大事记详情 -->
  <div id="detail" class="page">
    <button class="back-btn glass" onclick="go('events')">← 返回大事记</button>
    <div class="detail-box">
      <div class="detail-title" id="detailTitle"></div>
      <div class="detail-card glass-deep">
        <div style="font-size:40px; opacity:0.5; margin-bottom:10px;">📋</div>
        <div>暂无内容</div>
        <div style="font-size:13px; opacity:0.6;">记录待补充</div>
      </div>
    </div>
  </div>

  <!-- 图片查看器 -->
  <div class="viewer-overlay" id="viewer" onclick="closeViewer()">
    <div class="viewer-close" onclick="closeViewer(event)">×</div>
    <img id="bigImg" src="" alt="预览" onclick="event.stopPropagation()">
  </div>

  <script>
    (function() {
      // ---------- 数据 ----------
      const photoCategories = ['ugly', 'funny', 'group', 'personal']; // 除all外的分类
      // 模拟100张照片数据 (第一张为真实图片)
      const photoData = [];
      for (let i = 0; i < 100; i++) {
        if (i === 0) {
          photoData.push({
            src: 'mmexport1765334499291.jpg',
            category: 'personal',   // 第一张放在“个人分享”
            uploader: '暂无',
          });
        } else {
          // 随机分配一个分类 (便于展示筛选效果)
          const randomCat = photoCategories[Math.floor(Math.random() * photoCategories.length)];
          photoData.push({
            src: null,
            category: randomCat,
            uploader: '暂无',
          });
        }
      }

      // 大事记数据 (10条)
      const eventData = [];
      for (let i = 1; i <= 10; i++) {
        eventData.push({
          id: i,
          title: `第 ${i} 条大事记`,
          uploader: '暂无',
        });
      }

      // ---------- 渲染函数 ----------
      const photoGrid = document.getElementById('photoGrid');
      const eventsList = document.getElementById('eventsList');
      let currentPhotoFilter = 'all';

      // 渲染照片 (根据分类过滤)
      function renderPhotos(filterCat = 'all') {
        if (!photoGrid) return;
        const filtered = filterCat === 'all' 
          ? photoData 
          : photoData.filter(p => p.category === filterCat);
        
        photoGrid.innerHTML = '';
        filtered.forEach((photo, idx) => {
          const card = document.createElement('div');
          card.className = `photo-card glass ${photo.src ? 'has-image' : ''}`;
          
          if (photo.src) {
            card.innerHTML = `<img src="${photo.src}" alt="photo" loading="lazy">`;
            card.addEventListener('click', (e) => {
              if (photo.src) openImg(photo.src);
            });
          } else {
            card.innerHTML = `
              <div class="placeholder">
                <span style="font-size:36px; opacity:0.5;">🖼️</span>
                <span class="placeholder-text">暂 无</span>
              </div>
            `;
          }
          
          // 添加上传者信息条
          const uploaderDiv = document.createElement('div');
          uploaderDiv.className = 'photo-uploader';
          uploaderDiv.textContent = `上传：${photo.uploader || '暂无'}`;
          card.appendChild(uploaderDiv);
          
          photoGrid.appendChild(card);
        });
      }

      // 渲染大事记列表
      function renderEvents() {
        if (!eventsList) return;
        eventsList.innerHTML = '';
        eventData.forEach(ev => {
          const item = document.createElement('div');
          item.className = 'event-item glass';
          item.innerHTML = `
            <div class="event-index">${ev.id}</div>
            <div class="event-content">
              <div class="event-name">${ev.title}</div>
              <div class="event-meta">
                <span>上传：${ev.uploader || '暂无'}</span>
              </div>
            </div>
            <div class="event-arrow">→</div>
          `;
          item.addEventListener('click', () => openEvent(ev.id, ev.title));
          eventsList.appendChild(item);
        });
      }

      // 初始化分类点击
      function bindCategoryTabs() {
        const tabs = document.querySelectorAll('.cat-tab');
        tabs.forEach(tab => {
          tab.addEventListener('click', function(e) {
            tabs.forEach(t => t.classList.remove('active-tab'));
            this.classList.add('active-tab');
            const cat = this.dataset.cat;
            currentPhotoFilter = cat;
            renderPhotos(cat);
          });
        });
      }

      // 首次渲染
      renderPhotos('all');
      renderEvents();
      bindCategoryTabs();

      // 暴露全局函数
      window.go = function(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        const target = document.getElementById(id);
        if (target) {
          target.classList.add('active');
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        // 如果切换到照片页，保持当前分类筛选状态 (重新渲染确保一致)
        if (id === 'photos') {
          renderPhotos(currentPhotoFilter);
          // 确保tab高亮对应
          document.querySelectorAll('.cat-tab').forEach(t => {
            t.classList.remove('active-tab');
            if (t.dataset.cat === currentPhotoFilter) t.classList.add('active-tab');
          });
        }
      };

      window.openImg = function(src) {
        const viewer = document.getElementById('viewer');
        document.getElementById('bigImg').src = src;
        viewer.classList.add('show');
        document.body.style.overflow = 'hidden';
      };

      window.closeViewer = function(event) {
        const viewer = document.getElementById('viewer');
        if (event && event.target !== viewer && !event.target.classList.contains('viewer-close')) return;
        viewer.classList.remove('show');
        document.body.style.overflow = '';
        setTimeout(() => {
          if (!viewer.classList.contains('show')) {
            document.getElementById('bigImg').src = '';
          }
        }, 300);
      };

      window.openEvent = function(id, title) {
        document.getElementById('detailTitle').textContent = title + ' · 上传者：暂无';
        window.go('detail');
      };

      // ESC关闭
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          const viewer = document.getElementById('viewer');
          if (viewer.classList.contains('show')) {
            viewer.classList.remove('show');
            document.body.style.overflow = '';
            setTimeout(() => { document.getElementById('bigImg').src = ''; }, 300);
          }
        }
      });

    })();
  </script>
</body>
</html>
