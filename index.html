<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>18warehouse · 液态档案</title>
  <style>
    /* === 核心变量 · iOS 26 极致液态玻璃 === */
    :root {
      --liquid-base: rgba(255, 255, 255, 0.09);
      --liquid-hover: rgba(255, 255, 255, 0.18);
      --liquid-border: rgba(255, 255, 255, 0.22);
      --liquid-border-strong: rgba(255, 255, 255, 0.38);
      --liquid-shadow: 0 8px 36px rgba(0, 0, 0, 0.025), 0 2px 8px rgba(0, 0, 0, 0.012);
      --liquid-shadow-hover: 0 20px 48px rgba(0, 0, 0, 0.055), 0 4px 16px rgba(0, 0, 0, 0.022);
      --text-primary: #192433;
      --text-secondary: #3b4f64;
      --text-tertiary: #667e99;
      --accent: #3473ad;
      --accent-soft: #5094cc;
      --accent-glow: rgba(52, 115, 173, 0.16);
      --radius-sm: 10px;
      --radius: 14px;
      --radius-lg: 20px;
      --radius-xl: 26px;
      --font-display: 'Dancing Script', 'Caveat', 'Segoe Script', cursive;
      --font-body: "Microsoft YaHei UI", "PingFang SC", "SF Pro Text", "Inter", system-ui, -apple-system, sans-serif;
      --spring-slow: cubic-bezier(0.25, 1.2, 0.45, 1.05);
      --spring-bounce: cubic-bezier(0.34, 1.6, 0.64, 1);
      --ease-ios: cubic-bezier(0.22, 0.05, 0.19, 1);
      --morph-duration: 0.55s;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-body);
      background: radial-gradient(ellipse at 30% 20%, #edf6ff 0%, #e0eefc 40%, #e9f3fd 75%, #f6fbff 100%);
      background-attachment: fixed;
      min-height: 100vh;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      letter-spacing: 0.01em;
      overflow-x: hidden;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* 动态光斑 (更柔和液态) */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(150px);
      z-index: -1;
      pointer-events: none;
      will-change: transform;
      opacity: 0.65;
    }
    .orb-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #bed9ff 0%, #9fc5ff 72%);
      top: -120px; left: -60px;
      animation: orbFloat1 26s ease-in-out infinite;
    }
    .orb-2 {
      width: 700px; height: 700px;
      background: radial-gradient(circle, #d0e5ff 0%, #b3d1ff 76%);
      bottom: -180px; right: -140px;
      animation: orbFloat2 30s ease-in-out infinite;
    }
    .orb-3 {
      width: 450px; height: 450px;
      background: radial-gradient(circle, #e4f0ff 0%, #cadcff 80%);
      top: 58%; left: 58%;
      animation: orbFloat3 28s ease-in-out infinite;
      filter: blur(130px);
      opacity: 0.55;
    }

    @keyframes orbFloat1 {
      0%,100% { transform: translate(0,0) scale(1); }
      30% { transform: translate(65px,-45px) scale(1.08); }
      60% { transform: translate(-35px,50px) scale(0.91); }
      85% { transform: translate(-55px,-18px) scale(1.05); }
    }
    @keyframes orbFloat2 {
      0%,100% { transform: translate(0,0) scale(1); }
      30% { transform: translate(-55px,-58px) scale(1.07); }
      60% { transform: translate(45px,45px) scale(0.9); }
      85% { transform: translate(58px,-38px) scale(1.06); }
    }
    @keyframes orbFloat3 {
      0%,100% { transform: translate(0,0) scale(1); }
      35% { transform: translate(-48px,55px) scale(1.1); }
      70% { transform: translate(38px,-58px) scale(0.89); }
    }

    /* === iOS 26 液态玻璃核心 === */
    .liquid-glass {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(34px) saturate(2.5);
      -webkit-backdrop-filter: blur(34px) saturate(2.5);
      border: 1px solid rgba(255, 255, 255, 0.24);
      box-shadow: 0 10px 38px rgba(0, 0, 0, 0.022), 0 2px 12px rgba(0, 0, 0, 0.01), inset 0 0.5px 1px rgba(255,255,255,0.5);
      transition: all 0.5s var(--spring-slow), border-radius 0.5s var(--spring-slow);
      border-radius: var(--radius-lg);
      position: relative;
    }
    /* 边缘液体高光模拟 */
    .liquid-glass::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0.08) 45%, rgba(255,255,255,0.45) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      transition: opacity 0.4s;
    }
    .liquid-glass:hover {
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(255, 255, 255, 0.4);
      box-shadow: 0 24px 52px rgba(0, 0, 0, 0.06), 0 4px 20px rgba(0, 0, 0, 0.03), inset 0 0.5px 1px rgba(255,255,255,0.65);
      border-radius: var(--radius-xl);
    }
    .liquid-glass:active {
      transform: scale(0.965);
      transition: all 0.1s var(--ease-ios);
      border-radius: var(--radius);
    }

    .liquid-glass-deep {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(42px) saturate(2.8);
      -webkit-backdrop-filter: blur(42px) saturate(2.8);
      border: 1px solid rgba(255, 255, 255, 0.32);
      box-shadow: 0 20px 55px rgba(0,0,0,0.04), inset 0 0.5px 1px rgba(255,255,255,0.55);
    }

    /* 页面动画 */
    .page {
      display: none;
      min-height: 100vh;
      padding: 24px 28px;
      animation: pageReveal 0.6s var(--spring-slow);
    }
    .page.active { display: block; }

    @keyframes pageReveal {
      0% { opacity: 0; transform: translateY(20px) scale(0.96); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* 返回按钮 */
    .back-btn {
      position: fixed;
      top: 20px; left: 20px;
      z-index: 998;
      padding: 10px 22px;
      border-radius: 42px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(32px) saturate(2.2);
      -webkit-backdrop-filter: blur(32px) saturate(2.2);
      border: 1px solid rgba(255,255,255,0.32);
      color: var(--text-primary);
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.4s var(--spring-bounce);
    }
    .back-btn:active { transform: scale(0.9); }

    /* 标题 */
    .brand-title {
      font-family: var(--font-display);
      font-size: clamp(50px, 9vw, 68px);
      font-weight: 700;
      color: #132433;
      line-height: 1.05;
      margin-bottom: 34px;
      text-shadow: 0 8px 28px rgba(255,255,255,0.8);
      animation: titleFloat 7s ease-in-out infinite;
    }
    @keyframes titleFloat {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }

    .nav-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 28px;
      margin-bottom: 16px;
      cursor: pointer;
      transition: all 0.5s var(--spring-bounce);
    }

    /* === 分类标签容器 (液态椭圆滑动框) === */
    .cat-container {
      position: relative;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 24px;
      padding: 4px;
      border-radius: 48px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid rgba(255,255,255,0.22);
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.3);
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
    }
    /* 液态椭圆滑动背景 */
    .cat-slider {
      position: absolute;
      top: 4px;
      left: 4px;
      height: calc(100% - 8px);
      border-radius: 40px;
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.45);
      box-shadow: 0 4px 16px rgba(0,0,0,0.04), inset 0 1px 1px rgba(255,255,255,0.6);
      transition: all 0.45s var(--spring-slow);
      z-index: 0;
    }
    .cat-tab {
      padding: 10px 22px;
      border-radius: 36px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: color 0.3s;
      white-space: nowrap;
      z-index: 1;
      position: relative;
      background: transparent;
      border: none;
      user-select: none;
    }
    .cat-tab.active-tab {
      color: var(--accent);
      font-weight: 600;
    }

    /* 照片网格 */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
      padding-bottom: 35px;
      max-width: 900px;
      margin: 0 auto;
    }
    @media (min-width: 768px) {
      .photo-grid {
        grid-template-columns: repeat(2, minmax(0, 380px));
        justify-content: center;
      }
    }
    .photo-card {
      border-radius: var(--radius);
      overflow: hidden;
      transition: all 0.5s var(--spring-bounce);
      aspect-ratio: 4/3;
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 10px 32px rgba(0,0,0,0.025);
    }
    .photo-card:hover {
      transform: translateY(-6px) scale(1.02);
      border-color: rgba(255,255,255,0.4);
      box-shadow: 0 26px 52px rgba(0,0,0,0.07);
      border-radius: var(--radius-lg);
    }
    .photo-uploader {
      font-size: 12px;
      padding: 9px 12px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      text-align: center;
      color: var(--text-tertiary);
      border-top: 1px solid rgba(255,255,255,0.25);
    }

    .event-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px;
      cursor: pointer;
      transition: all 0.45s var(--spring-bounce);
    }

    .detail-card {
      padding: 44px 32px;
      text-align: center;
      color: var(--text-tertiary);
      border-radius: var(--radius-xl);
    }

    .viewer-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(4,8,16,0.9);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    .viewer-overlay.show { display: flex; }

    @media (max-width: 640px) {
      .page { padding: 10px 14px; }
      .photo-grid { gap: 10px; }
      .cat-tab { padding: 8px 16px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div id="home" class="page active">
    <div style="max-width:720px; margin:65px auto 0;">
      <div class="brand-title">18warehouse</div>
      <div class="nav-card liquid-glass" onclick="go('photos')">
        <div><span style="font-weight:600; font-size:17px;">照片</span><div style="font-size:13px; color:#667e99;">丑照 · 恶搞 · 合照 · 个人分享</div></div>
        <span>→</span>
      </div>
      <div class="nav-card liquid-glass" onclick="go('events')">
        <div><span style="font-weight:600; font-size:17px;">大事记</span><div style="font-size:13px; color:#667e99;">10 条记录</div></div>
        <span>→</span>
      </div>
    </div>
  </div>

  <div id="photos" class="page">
    <button class="back-btn" onclick="go('home')">← 返回</button>
    <div style="text-align:center; margin:6px 0 20px;"><div style="font-size:28px; font-weight:700;">照片</div></div>
    <div class="cat-container" id="catContainer">
      <div class="cat-slider" id="catSlider"></div>
    </div>
    <div class="photo-grid" id="photoGrid"></div>
  </div>

  <div id="events" class="page">
    <button class="back-btn" onclick="go('home')">← 返回</button>
    <div style="text-align:center; margin-bottom:22px;"><div style="font-size:28px; font-weight:700;">大事记</div></div>
    <div id="eventsList" style="max-width:720px; margin:0 auto; display:flex; flex-direction:column; gap:12px;"></div>
  </div>

  <div id="detail" class="page">
    <button class="back-btn" onclick="go('events')">← 返回</button>
    <div style="max-width:700px; margin:60px auto 0;">
      <div id="detailTitle" style="font-size:26px; font-weight:700; margin-bottom:22px;"></div>
      <div class="detail-card liquid-glass-deep">
        <div style="font-size:42px; opacity:0.3;">📋</div>暂无内容
      </div>
    </div>
  </div>

  <div class="viewer-overlay" id="viewer" onclick="closeViewer()">
    <span style="position:absolute; top:24px; right:28px; font-size:36px; color:#fff; cursor:pointer;">×</span>
    <img id="bigImg" style="max-width:92%; max-height:85%; border-radius:18px;" onclick="event.stopPropagation()">
  </div>

  <script>
    (() => {
      const cats = ['all', 'ugly', 'funny', 'group', 'personal'];
      const catNames = { all:'全部', ugly:'丑照', funny:'恶搞', group:'合照', personal:'个人分享' };
      let currentCat = 'all';
      
      const photos = Array.from({length:100}, (_,i) => ({
        src: i===0 ? 'mmexport1765334499291.jpg' : null,
        category: i===0 ? 'personal' : cats[Math.floor(Math.random()*4)+1],
        uploader: '暂无'
      }));
      const events = Array.from({length:10}, (_,i) => ({id:i+1, title:`第 ${i+1} 条大事记`, uploader:'暂无'}));

      function renderPhotos(cat) {
        const grid = document.getElementById('photoGrid');
        if(!grid) return;
        const filtered = cat==='all' ? photos : photos.filter(p=>p.category===cat);
        grid.innerHTML = filtered.map(p=>`
          <div class="photo-card" onclick="${p.src?`openImg('${p.src}')`:''}">
            ${p.src ? `<img src="${p.src}" style="width:100%;height:100%;object-fit:cover;">` : `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#8699af;">暂无</div>`}
            <div class="photo-uploader">上传：${p.uploader}</div>
          </div>`).join('');
      }

      function moveSlider() {
        const slider = document.getElementById('catSlider');
        const activeTab = document.querySelector('.cat-tab.active-tab');
        if (!slider || !activeTab) return;
        const container = document.getElementById('catContainer');
        const tabRect = activeTab.getBoundingClientRect();
        const containerRect = container.getBoundingClientRect();
        slider.style.width = `${tabRect.width}px`;
        slider.style.left = `${tabRect.left - containerRect.left}px`;
      }

      function renderTabs() {
        const container = document.getElementById('catContainer');
        if(!container) return;
        container.querySelectorAll('.cat-tab').forEach(t => t.remove());
        cats.forEach(c => {
          const tab = document.createElement('div');
          tab.className = `cat-tab ${c===currentCat?'active-tab':''}`;
          tab.dataset.cat = c;
          tab.textContent = catNames[c];
          tab.addEventListener('click', function() {
            currentCat = this.dataset.cat;
            renderTabs();
            renderPhotos(currentCat);
            setTimeout(moveSlider, 20);
          });
          container.appendChild(tab);
        });
        setTimeout(moveSlider, 30);
      }

      function renderEvents() {
        const list = document.getElementById('eventsList');
        if(!list) return;
        list.innerHTML = events.map(e=>`
          <div class="event-item liquid-glass" onclick="openEvent(${e.id},'${e.title}')">
            <div><strong>${e.title}</strong><div style="font-size:12px; color:#667e99;">上传：${e.uploader}</div></div>
            <span>→</span>
          </div>`).join('');
      }

      window.go = (id) => {
        document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo({top:0, behavior:'smooth'});
        if(id==='photos') { renderTabs(); renderPhotos(currentCat); setTimeout(moveSlider, 80); }
      };

      window.openImg = (src) => {
        document.getElementById('bigImg').src = src;
        document.getElementById('viewer').classList.add('show');
      };
      window.closeViewer = (e) => {
        if(e && e.target !== document.getElementById('viewer') && !e.target.classList.contains('viewer-close')) return;
        document.getElementById('viewer').classList.remove('show');
      };
      window.openEvent = (id, title) => {
        document.getElementById('detailTitle').textContent = title;
        go('detail');
      };

      document.addEventListener('keydown', (e) => { if(e.key==='Escape') document.getElementById('viewer').classList.remove('show'); });
      window.addEventListener('resize', () => { if(document.getElementById('photos').classList.contains('active')) moveSlider(); });

      renderTabs();
      renderPhotos('all');
      renderEvents();
    })();
  </script>
</body>
</html>
