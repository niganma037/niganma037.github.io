<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>校园论坛 · 青春回声 | 多功能社区</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0a0f1f, #03060c);
            min-height: 100vh;
            color: #eef5ff;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #1e2a36; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #3aa5b3; border-radius: 10px; }

        .glass-card {
            background: rgba(18, 28, 40, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(80, 190, 210, 0.35);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.3);
        }

        .navbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 2rem;
            margin: 1.5rem 2rem;
            background: rgba(8, 18, 28, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 60px;
            border: 1px solid rgba(70, 190, 210, 0.5);
        }
        .logo h1 {
            font-size: 1.7rem;
            font-weight: 700;
            background: linear-gradient(130deg, #c0ffff, #67d1e0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .search-area {
            flex: 1;
            max-width: 360px;
            margin: 0 20px;
        }
        .search-box {
            display: flex;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50px;
            padding: 0.5rem 1.2rem;
            border: 1px solid rgba(90, 200, 210, 0.6);
        }
        .search-box input {
            background: transparent;
            border: none;
            width: 100%;
            outline: none;
            color: #f0f6ff;
        }
        .auth-buttons {
            display: flex;
            gap: 12px;
        }
        .btn-glow {
            background: rgba(25, 45, 65, 0.8);
            border: 1px solid rgba(80, 190, 210, 0.7);
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 500;
            color: #e2f0ff;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-glow:hover {
            background: #2b6f7e;
            box-shadow: 0 0 10px #4bc6d6;
        }
        .btn-primary {
            background: linear-gradient(95deg, #16707f, #2b95a8);
            border: none;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-avatar-sm {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
            background: #2c8d9e;
            cursor: pointer;
            border: 1px solid #7adbe8;
        }
        .container {
            max-width: 1300px;
            margin: 1.5rem auto;
            padding: 0 2rem;
        }
        .forum-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1.8rem;
        }
        .posts-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .post-card {
            background: rgba(15, 25, 38, 0.7);
            backdrop-filter: blur(6px);
            border-radius: 28px;
            padding: 1.4rem 1.8rem;
            border-left: 4px solid #3bb5c5;
            cursor: pointer;
            transition: 0.2s;
        }
        .post-card:hover { transform: translateY(-3px); background: rgba(30, 48, 68, 0.8); }
        .post-title { font-size: 1.45rem; font-weight: 600; margin-bottom: 8px; }
        .post-meta { display: flex; gap: 20px; font-size: 0.78rem; color: #99bbdf; border-bottom: 1px dashed rgba(90,180,190,0.4); padding-bottom: 8px; margin-bottom: 12px; }
        .post-excerpt { color: #cddef5; margin-bottom: 12px; }
        .media-preview { max-width: 100%; max-height: 200px; border-radius: 16px; margin-top: 10px; }
        .card-actions { display: flex; justify-content: flex-end; gap: 12px; }
        .card-btn { background: transparent; border: none; color: #94c2db; padding: 5px 14px; border-radius: 30px; cursor: pointer; }
        .card-btn.danger { color: #ffb09c; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1100;
            overflow-y: auto;
        }
        .modal-content {
            background: rgba(18, 28, 42, 0.96);
            backdrop-filter: blur(18px);
            border-radius: 40px;
            width: 90%;
            max-width: 700px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 2rem;
            border: 1px solid #44bbc9;
        }
        .close-modal { float: right; font-size: 1.7rem; cursor: pointer; }
        input, textarea, select, .file-label {
            width: 100%;
            padding: 12px 18px;
            margin: 10px 0;
            background: #0d1922;
            border: 1px solid #358b99;
            border-radius: 50px;
            color: white;
            outline: none;
        }
        textarea { border-radius: 28px; resize: vertical; }
        .reply-item {
            background: rgba(0,0,0,0.3);
            border-radius: 24px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            gap: 12px;
        }
        .reply-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
        }
        .reply-content { flex: 1; }
        .reply-name { font-weight: 600; font-size: 0.85rem; }
        .anonymous-badge { font-size: 0.7rem; background: #2c4b5a; border-radius: 20px; padding: 2px 8px; margin-left: 8px; }
        hr { border-color: #2d6e7a; margin: 12px 0; }
        .profile-header { display: flex; gap: 20px; align-items: center; margin-bottom: 20px; }
        .profile-avatar-lg { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 2px solid #4bc6d6; }
        .toast {
            position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
            background: #1a2e3bb3; backdrop-filter: blur(16px); padding: 10px 24px;
            border-radius: 60px; border-left: 3px solid #4bc6d6; z-index: 1200;
        }
        @media (max-width: 780px) {
            .navbar { flex-direction: column; gap: 12px; }
            .search-area { max-width: 100%; width: 100%; }
        }
    </style>
</head>
<body>

<div class="navbar glass-card">
    <div class="logo"><h1><i class="fas fa-graduation-cap"></i> 校园论坛</h1></div>
    <div class="search-area"><div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="搜索帖子..."></div></div>
    <div class="auth-buttons" id="authSection"></div>
</div>

<div class="container">
    <div class="forum-header"><div class="post-stats"><i class="fas fa-fire"></i> 今日热议 · <span id="postCount">0</span> 个话题</div><button id="showNewPostBtn" class="btn-glow btn-primary" style="display: none;"><i class="fas fa-plus"></i> 发布新帖</button></div>
    <div id="postsContainer" class="posts-grid"></div>
</div>

<!-- 模态框们 -->
<div id="loginModal" class="modal"><div class="modal-content"><span class="close-modal" data-modal="loginModal">&times;</span><h3>登录</h3><input type="text" id="loginUsername" placeholder="用户名"><input type="password" id="loginPassword" placeholder="密码"><button id="doLoginBtn" class="btn-glow btn-primary">登录</button></div></div>
<div id="registerModal" class="modal"><div class="modal-content"><span class="close-modal" data-modal="registerModal">&times;</span><h3>注册</h3><input type="text" id="regUsername" placeholder="用户名 (2~16)"><input type="password" id="regPassword" placeholder="密码 ≥3"><button id="doRegisterBtn" class="btn-glow btn-primary">注册并登录</button></div></div>
<div id="newPostModal" class="modal"><div class="modal-content"><span class="close-modal" data-modal="newPostModal">&times;</span><h3>发布新话题</h3><input type="text" id="postTitle" placeholder="标题"><textarea id="postContent" placeholder="分享你的故事..."></textarea><div><input type="file" id="postMedia" accept="image/*,video/*" style="display:none"><button id="uploadMediaBtn" class="btn-glow" style="width:auto; padding:6px 15px; margin:5px 0;"><i class="fas fa-photo-video"></i> 上传照片/视频</button><span id="mediaFileName" style="margin-left:10px; font-size:0.8rem;"></span></div><div id="mediaPreview" style="margin:10px 0;"></div><button id="submitPostBtn" class="btn-glow btn-primary">发布</button></div></div>

<div id="detailModal" class="modal"><div class="modal-content" style="max-width: 800px;"><span class="close-modal" data-modal="detailModal">&times;</span><h3 id="detailTitle"></h3><div style="margin:8px 0; font-size:0.8rem;"><i class="fas fa-user"></i> <span id="detailAuthor"></span> &nbsp;|&nbsp; <i class="far fa-calendar"></i> <span id="detailDate"></span></div><div id="detailMedia" style="margin:10px 0;"></div><div id="detailContent" style="white-space: pre-wrap; background: rgba(0,0,0,0.2); border-radius: 24px; padding: 16px;"></div><hr><h4><i class="fas fa-comments"></i> 回复 (<span id="replyCount">0</span>)</h4><div id="repliesList" style="max-height: 300px; overflow-y: auto; margin-bottom: 15px;"></div><div id="replyForm"><textarea id="replyContent" rows="2" placeholder="写下你的回复..."></textarea><div><label style="cursor:pointer"><input type="checkbox" id="anonymousReply"> 匿名回复 (隐藏头像和昵称)</label></div><button id="submitReplyBtn" class="btn-glow btn-primary" style="margin-top:6px;">发表回复</button></div></div></div>

<div id="profileModal" class="modal"><div class="modal-content"><span class="close-modal" data-modal="profileModal">&times;</span><div id="profileView"></div></div></div>

<script>
    // ---------- 存储KEY ----------
    const STORAGE_USERS = "campus_forum_users";
    const STORAGE_POSTS = "campus_forum_posts";
    const STORAGE_REPLIES = "campus_forum_replies";
    let currentUser = null;
    let allPosts = [];
    let allReplies = [];
    let searchKeyword = "";
    let currentDetailPostId = null;
    let currentViewProfileUser = null; // 查看的个人主页用户对象

    // 辅助
    function showToast(msg, isError = false) {
        let toast = document.createElement('div'); toast.className = 'toast';
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-circle-info'}"></i> ${msg}`;
        toast.style.background = isError ? '#551e1ea0' : '#1a4d5ba0';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2600);
    }

    // 初始化空数据（无示例）
    function initData() {
        if (!localStorage.getItem(STORAGE_USERS)) localStorage.setItem(STORAGE_USERS, JSON.stringify([]));
        if (!localStorage.getItem(STORAGE_POSTS)) localStorage.setItem(STORAGE_POSTS, JSON.stringify([]));
        if (!localStorage.getItem(STORAGE_REPLIES)) localStorage.setItem(STORAGE_REPLIES, JSON.stringify([]));
    }

    function loadData() {
        allPosts = JSON.parse(localStorage.getItem(STORAGE_POSTS));
        allReplies = JSON.parse(localStorage.getItem(STORAGE_REPLIES));
        allPosts.sort((a,b)=>new Date(b.date)-new Date(a.date));
    }
    function savePosts() { localStorage.setItem(STORAGE_POSTS, JSON.stringify(allPosts)); }
    function saveReplies() { localStorage.setItem(STORAGE_REPLIES, JSON.stringify(allReplies)); }
    function getUsers() { return JSON.parse(localStorage.getItem(STORAGE_USERS)); }
    function saveUsers(users) { localStorage.setItem(STORAGE_USERS, JSON.stringify(users)); }

    // 用户相关
    function registerUser(username, password) {
        let users = getUsers();
        if (users.find(u=>u.username===username)) return {success:false, msg:"用户名已存在"};
        if (username.length<2 || password.length<3) return {success:false, msg:"用户名≥2，密码≥3"};
        const defaultAvatar = "https://via.placeholder.com/100?text=User";
        users.push({ username, password, avatar: defaultAvatar, bio: "这个人很懒，什么都没写～" });
        saveUsers(users);
        return {success:true};
    }
    function loginUser(username, password) {
        let users = getUsers();
        let user = users.find(u=>u.username===username && u.password===password);
        if(user) return {success:true, user:{username:user.username, avatar:user.avatar, bio:user.bio}};
        return {success:false, msg:"用户名或密码错误"};
    }
    function updateUserProfile(username, newAvatar, newBio) {
        let users = getUsers();
        let idx = users.findIndex(u=>u.username===username);
        if(idx!==-1){
            if(newAvatar) users[idx].avatar = newAvatar;
            if(newBio !== undefined) users[idx].bio = newBio;
            saveUsers(users);
            if(currentUser && currentUser.username===username){
                currentUser.avatar = users[idx].avatar;
                currentUser.bio = users[idx].bio;
                updateAuthUI();
            }
            return true;
        }
        return false;
    }

    // 获取用户完整信息
    function getUserInfo(username) {
        return getUsers().find(u=>u.username===username);
    }

    // 头像点击查看个人主页
    function showProfilePage(username) {
        const user = getUserInfo(username);
        if(!user) return;
        currentViewProfileUser = user;
        const isSelf = currentUser && currentUser.username === username;
        const modal = document.getElementById('profileModal');
        const container = document.getElementById('profileView');
        container.innerHTML = `
            <div class="profile-header">
                <img src="${user.avatar}" class="profile-avatar-lg" id="profileAvatarImg">
                <div><h2>${escapeHtml(user.username)}</h2><p>${escapeHtml(user.bio || '暂无简介')}</p></div>
            </div>
            ${isSelf ? `<button id="editProfileBtn" class="btn-glow"><i class="fas fa-edit"></i> 编辑个人主页</button>` : ''}
            <div id="editProfileArea" style="display:none; margin-top:20px;">
                <input type="file" id="editAvatarInput" accept="image/*"><br>
                <textarea id="editBioInput" rows="2" placeholder="个人简介">${escapeHtml(user.bio || '')}</textarea>
                <button id="saveProfileBtn" class="btn-glow btn-primary">保存修改</button>
            </div>
        `;
        if(isSelf){
            document.getElementById('editProfileBtn').onclick = () => {
                const area = document.getElementById('editProfileArea');
                area.style.display = area.style.display === 'none' ? 'block' : 'none';
            };
            document.getElementById('saveProfileBtn').onclick = () => {
                const file = document.getElementById('editAvatarInput').files[0];
                if(file){
                    const reader = new FileReader();
                    reader.onload = e => {
                        updateUserProfile(currentUser.username, e.target.result, document.getElementById('editBioInput').value);
                        showToast("资料更新成功");
                        document.getElementById('profileModal').style.display = 'none';
                        showProfilePage(currentUser.username);
                    };
                    reader.readAsDataURL(file);
                } else {
                    updateUserProfile(currentUser.username, null, document.getElementById('editBioInput').value);
                    showToast("资料更新成功");
                    document.getElementById('profileModal').style.display = 'none';
                    showProfilePage(currentUser.username);
                }
            };
        }
        modal.style.display = 'flex';
    }

    // UI
    function updateAuthUI() {
        const authDiv = document.getElementById('authSection');
        const newPostBtn = document.getElementById('showNewPostBtn');
        if(currentUser){
            authDiv.innerHTML = `<div class="user-info"><img src="${currentUser.avatar}" class="user-avatar-sm" id="navAvatar"><span>${escapeHtml(currentUser.username)}</span><button id="logoutBtn" class="btn-glow">登出</button></div>`;
            newPostBtn.style.display = 'flex';
            document.getElementById('navAvatar')?.addEventListener('click',()=>showProfilePage(currentUser.username));
        } else {
            authDiv.innerHTML = `<button id="loginBtn" class="btn-glow">登录</button><button id="registerBtn" class="btn-glow">注册</button>`;
            newPostBtn.style.display = 'none';
        }
        bindAuthButtons();
    }
    function bindAuthButtons(){
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        if(loginBtn) loginBtn.onclick = () => openModal('loginModal');
        if(registerBtn) registerBtn.onclick = () => openModal('registerModal');
        const logout = document.getElementById('logoutBtn');
        if(logout) logout.onclick = () => { currentUser = null; updateAuthUI(); renderPosts(); showToast("已登出"); };
    }

    function renderPosts() {
        let filtered = allPosts.filter(p => searchKeyword.trim()==='' || p.title.includes(searchKeyword) || p.content.includes(searchKeyword));
        document.getElementById('postCount').innerText = filtered.length;
        const container = document.getElementById('postsContainer');
        if(filtered.length===0){ container.innerHTML = `<div class="glass-card no-result" style="text-align:center; padding:60px;">暂无帖子，快来发布第一个话题～</div>`; return; }
        let html = '';
        filtered.forEach(post => {
            const isAuthor = currentUser && currentUser.username === post.author;
            html += `<div class="post-card" data-id="${post.id}">
                        <div class="post-title">${escapeHtml(post.title)}</div>
                        <div class="post-meta"><span><i class="fas fa-user"></i> ${escapeHtml(post.author)}</span><span><i class="far fa-clock"></i> ${new Date(post.date).toLocaleString()}</span></div>
                        <div class="post-excerpt">${escapeHtml(post.content.substring(0,100))}...</div>
                        ${post.mediaUrl ? `<div><i class="fas ${post.mediaType==='image'?'fa-image':'fa-video'}"></i> 媒体附件</div>` : ''}
                        <div class="card-actions"><button class="card-btn view-detail" data-id="${post.id}">查看详情</button>${isAuthor ? `<button class="card-btn danger delete-post" data-id="${post.id}">删除</button>` : ''}</div>
                    </div>`;
        });
        container.innerHTML = html;
        document.querySelectorAll('.view-detail').forEach(btn=>btn.addEventListener('click',(e)=>{e.stopPropagation(); showPostDetail(btn.dataset.id);}));
        document.querySelectorAll('.delete-post').forEach(btn=>btn.addEventListener('click',(e)=>{e.stopPropagation(); deletePost(btn.dataset.id);}));
        document.querySelectorAll('.post-card').forEach(card=>card.addEventListener('click',()=>showPostDetail(card.dataset.id)));
    }

    function deletePost(id){
        if(!currentUser) return showToast("请先登录",true);
        const post = allPosts.find(p=>p.id===id);
        if(!post || post.author !== currentUser.username) return showToast("无权删除",true);
        if(confirm("删除后无法恢复")){
            allPosts = allPosts.filter(p=>p.id!==id);
            allReplies = allReplies.filter(r=>r.postId!==id);
            savePosts(); saveReplies();
            renderPosts();
            showToast("已删除");
        }
    }

    function showPostDetail(postId){
        const post = allPosts.find(p=>p.id===postId);
        if(!post) return;
        currentDetailPostId = postId;
        document.getElementById('detailTitle').innerText = post.title;
        document.getElementById('detailAuthor').innerHTML = `<span style="cursor:pointer; color:#7adbe8;" onclick="showProfilePage('${post.author}')">${escapeHtml(post.author)}</span>`;
        document.getElementById('detailDate').innerText = new Date(post.date).toLocaleString();
        document.getElementById('detailContent').innerHTML = escapeHtml(post.content).replace(/\n/g,'<br>');
        const mediaDiv = document.getElementById('detailMedia');
        if(post.mediaUrl){
            if(post.mediaType === 'image') mediaDiv.innerHTML = `<img src="${post.mediaUrl}" class="media-preview" style="max-height:300px;">`;
            else mediaDiv.innerHTML = `<video controls src="${post.mediaUrl}" class="media-preview" style="max-height:300px;"></video>`;
        } else mediaDiv.innerHTML = '';
        loadReplies(postId);
        openModal('detailModal');
    }

    function loadReplies(postId){
        let replies = allReplies.filter(r=>r.postId===postId).sort((a,b)=>new Date(a.date)-new Date(b.date));
        document.getElementById('replyCount').innerText = replies.length;
        const container = document.getElementById('repliesList');
        if(replies.length===0){ container.innerHTML = '<div style="text-align:center; padding:20px;">暂无回复，抢沙发～</div>'; return; }
        let html = '';
        replies.forEach(rep => {
            const isAnon = rep.isAnonymous;
            const displayName = isAnon ? "匿名网友" : rep.author;
            const avatarUrl = isAnon ? "https://via.placeholder.com/40?text=?" : (rep.authorAvatar || "https://via.placeholder.com/40?text=U");
            html += `<div class="reply-item">
                        <img src="${avatarUrl}" class="reply-avatar" onclick="${!isAnon && rep.author ? `showProfilePage('${rep.author}')` : ''}" style="cursor:${!isAnon && rep.author ? 'pointer':'default'}">
                        <div class="reply-content">
                            <div class="reply-name">${escapeHtml(displayName)} ${isAnon ? '<span class="anonymous-badge">匿名</span>' : ''}</div>
                            <div style="font-size:0.75rem; color:#99bbdf;">${new Date(rep.date).toLocaleString()}</div>
                            <div style="margin-top:5px;">${escapeHtml(rep.content)}</div>
                        </div>
                    </div>`;
        });
        container.innerHTML = html;
    }

    function addReply(postId, content, isAnonymous){
        if(!currentUser) { showToast("请先登录",true); return false; }
        if(!content.trim()){ showToast("回复内容不能为空",true); return false; }
        const userInfo = getUserInfo(currentUser.username);
        const reply = {
            id: Date.now()+Math.random(),
            postId, content: content.trim(),
            author: isAnonymous ? "匿名用户" : currentUser.username,
            authorAvatar: isAnonymous ? null : (userInfo.avatar || "https://via.placeholder.com/40"),
            isAnonymous, date: new Date().toISOString()
        };
        allReplies.push(reply);
        saveReplies();
        loadReplies(postId);
        showToast("回复成功");
        return true;
    }

    function createPost(title, content, mediaBase64, mediaType){
        if(!currentUser) { showToast("请先登录",true); return false; }
        if(!title.trim() || !content.trim()){ showToast("标题和内容不能为空",true); return false; }
        const newPost = {
            id: Date.now()+Math.random(),
            title: title.trim(), content: content.trim(),
            author: currentUser.username,
            date: new Date().toISOString(),
            mediaUrl: mediaBase64 || null,
            mediaType: mediaType || null
        };
        allPosts.unshift(newPost);
        savePosts();
        renderPosts();
        return true;
    }

    // 媒体上传处理
    let pendingMedia = null, pendingMediaType = null;
    document.getElementById('uploadMediaBtn')?.addEventListener('click',()=>{
        document.getElementById('postMedia').click();
    });
    document.getElementById('postMedia')?.addEventListener('change',(e)=>{
        const file = e.target.files[0];
        if(!file) return;
        if(file.size > 50 * 1024 * 1024) { showToast("文件不能超过50MB",true); return; }
        const reader = new FileReader();
        reader.onload = ev => {
            pendingMedia = ev.target.result;
            pendingMediaType = file.type.startsWith('image/') ? 'image' : 'video';
            document.getElementById('mediaFileName').innerText = file.name;
            const previewDiv = document.getElementById('mediaPreview');
            if(pendingMediaType === 'image') previewDiv.innerHTML = `<img src="${pendingMedia}" class="media-preview" style="max-height:120px;">`;
            else previewDiv.innerHTML = `<video controls src="${pendingMedia}" style="max-height:120px;"></video>`;
        };
        reader.readAsDataURL(file);
    });

    // 模态框逻辑
    function openModal(id){ document.getElementById(id).style.display = 'flex'; }
    function closeAllModals(){ document.querySelectorAll('.modal').forEach(m=>m.style.display='none'); }
    document.querySelectorAll('.close-modal').forEach(el=>el.addEventListener('click',()=>closeAllModals()));
    window.onclick = e => { if(e.target.classList.contains('modal')) e.target.style.display = 'none'; };

    // 绑定事件
    function bindEvents(){
        document.getElementById('doLoginBtn')?.addEventListener('click',()=>{
            const uname = document.getElementById('loginUsername').value.trim();
            const pwd = document.getElementById('loginPassword').value;
            const res = loginUser(uname,pwd);
            if(res.success){
                currentUser = { username: res.user.username, avatar: res.user.avatar, bio: res.user.bio };
                updateAuthUI(); renderPosts(); closeAllModals();
                showToast(`欢迎 ${uname}`);
            } else showToast(res.msg,true);
        });
        document.getElementById('doRegisterBtn')?.addEventListener('click',()=>{
            const uname = document.getElementById('regUsername').value.trim();
            const pwd = document.getElementById('regPassword').value;
            const res = registerUser(uname,pwd);
            if(res.success){
                const loginRes = loginUser(uname,pwd);
                if(loginRes.success){
                    currentUser = { username: uname, avatar: loginRes.user.avatar, bio: loginRes.user.bio };
                    updateAuthUI(); renderPosts(); closeAllModals();
                    showToast(`注册成功，欢迎 ${uname}`);
                }
            } else showToast(res.msg,true);
        });
        document.getElementById('showNewPostBtn')?.addEventListener('click',()=>{
            if(!currentUser) showToast("请先登录",true);
            else { document.getElementById('postTitle').value=''; document.getElementById('postContent').value=''; pendingMedia=null; pendingMediaType=null; document.getElementById('mediaPreview').innerHTML=''; document.getElementById('mediaFileName').innerText=''; openModal('newPostModal'); }
        });
        document.getElementById('submitPostBtn')?.addEventListener('click',()=>{
            const title = document.getElementById('postTitle').value;
            const content = document.getElementById('postContent').value;
            if(createPost(title, content, pendingMedia, pendingMediaType)){
                closeAllModals();
                showToast("发布成功");
            }
        });
        document.getElementById('submitReplyBtn')?.addEventListener('click',()=>{
            if(!currentDetailPostId) return;
            const content = document.getElementById('replyContent').value;
            const isAnon = document.getElementById('anonymousReply').checked;
            if(addReply(currentDetailPostId, content, isAnon)){
                document.getElementById('replyContent').value = '';
                document.getElementById('anonymousReply').checked = false;
            }
        });
        document.getElementById('searchInput')?.addEventListener('input',(e)=>{ searchKeyword = e.target.value; renderPosts(); });
    }

    function escapeHtml(str){
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; });
    }

    window.showProfilePage = showProfilePage;
    initData();
    loadData();
    currentUser = null;
    updateAuthUI();
    bindEvents();
    renderPosts();
</script>
</body>
</html>
